{{- if .Values.networkPolicy.enabled }}
# Default-deny posture: only the mesh gateway, same-business-area peers,
# and Prometheus may reach this service domain.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: {{ include "sd.name" . }}
  labels:
    {{- include "sd.labels" . | nindent 4 }}
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: {{ include "sd.name" . }}
  ingress:
    # Cilium's Gateway API / ingress Envoy
    - fromEntities:
        - ingress
    # Service domains in the same namespace (same BIAN business area)
    - fromEndpoints:
        - matchLabels:
            app.kubernetes.io/part-of: bian-platform
    # Prometheus scraping from the monitoring namespace
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: {{ .Values.networkPolicy.monitoringNamespace }}
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
  egress:
    # DNS via kube-dns (required once default-deny applies)
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
    # Other BIAN service domains (cross-domain service operations)
    - toEndpoints:
        - matchLabels:
            app.kubernetes.io/part-of: bian-platform
{{- end }}
