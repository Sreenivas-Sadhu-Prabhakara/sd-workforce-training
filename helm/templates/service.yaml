apiVersion: v1
kind: Service
metadata:
  name: {{ include "sd.name" . }}
  labels:
    {{- include "sd.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "sd.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
